
<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{padding:1.5rem;max-width:720px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.header h1{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.btn-circle{width:36px;height:36px;border-radius:50%;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.btn-circle:hover{background:var(--color-background-secondary)}
.empty{text-align:center;padding:3rem 1rem;color:var(--color-text-secondary);font-size:15px}
.book-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:10px;overflow:hidden}
.book-header{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;user-select:none}
.book-cover{width:38px;height:50px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;letter-spacing:-0.5px}
.book-info{flex:1;min-width:0}
.book-title{font-size:15px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-meta{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.book-chev{font-size:10px;color:var(--color-text-tertiary)}
.ch-list{border-top:0.5px solid var(--color-border-tertiary)}
.ch-row{display:flex;align-items:center;padding:9px 16px;gap:10px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer}
.ch-row:last-child{border-bottom:none}
.ch-row:hover{background:var(--color-background-secondary)}
.ch-n{font-size:12px;color:var(--color-text-tertiary);width:18px;text-align:right;flex-shrink:0}
.ch-t{flex:1;font-size:13px;color:var(--color-text-primary)}
.ch-badge{font-size:11px;padding:2px 7px;border-radius:99px;flex-shrink:0}
.b-done{background:#EAF3DE;color:#3B6D11}
.b-empty{background:var(--color-background-secondary);color:var(--color-text-tertiary);border:0.5px solid var(--color-border-tertiary)}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.42);display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;min-height:420px}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.25rem 1.5rem;width:100%;max-width:460px}
.modal h2{font-size:16px;font-weight:500;margin-bottom:1rem;color:var(--color-text-primary)}
input[type=text]{width:100%;padding:9px 12px;font-size:14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);outline:none;margin-bottom:6px}
input[type=text]:focus{border-color:var(--color-border-primary)}
.sugg-list{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden;margin-bottom:10px}
.sugg-item{padding:9px 12px;cursor:pointer;border-bottom:0.5px solid var(--color-border-tertiary)}
.sugg-item:last-child{border-bottom:none}
.sugg-item:hover,.sugg-item.active{background:var(--color-background-secondary)}
.sugg-title{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.sugg-author{font-size:12px;color:var(--color-text-secondary)}
.preview{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:10px;font-size:13px}
.preview strong{font-weight:500;color:var(--color-text-primary);display:block;margin-bottom:2px}
.preview span{color:var(--color-text-secondary)}
.ch-preview{margin-top:8px;max-height:120px;overflow-y:auto}
.ch-preview-item{font-size:12px;color:var(--color-text-secondary);padding:2px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.ch-preview-item:last-child{border-bottom:none}
.hint{font-size:12px;color:var(--color-text-secondary);min-height:16px;margin-bottom:6px}
.spin{display:inline-block;width:12px;height:12px;border:1.5px solid var(--color-border-tertiary);border-top-color:var(--color-text-secondary);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}
.btn{padding:7px 14px;font-size:13px;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary)}
.btn:hover{background:var(--color-background-secondary)}
.btn-p{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.btn-p:hover{opacity:.85}
.btn-p:disabled{opacity:.38;cursor:not-allowed}
.rec-area{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem;margin-bottom:10px;display:flex;flex-direction:column;align-items:center;gap:6px;min-height:76px;justify-content:center}
.rec-time{font-size:28px;font-weight:500;color:var(--color-text-primary);font-variant-numeric:tabular-nums}
.rec-lbl{font-size:12px;color:var(--color-text-secondary)}
.rec-dot{width:7px;height:7px;border-radius:50%;background:#E24B4A;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.rec-btns{display:flex;gap:10px;justify-content:center;margin-bottom:10px}
.rb{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary)}
.rb:hover{background:var(--color-background-secondary)}
.rb:disabled{opacity:.3;cursor:default;pointer-events:none}
.tbox{font-size:13px;color:var(--color-text-secondary);line-height:1.6;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:9px 11px;margin-bottom:9px;max-height:80px;overflow-y:auto}
textarea{width:100%;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 11px;min-height:50px;resize:vertical;background:var(--color-background-primary);color:var(--color-text-primary);margin-bottom:9px;outline:none;font-family:var(--font-sans)}
.kp-wrap{border-top:0.5px solid var(--color-border-tertiary);padding-top:10px;margin-top:2px}
.kp-wrap h3{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:7px}
.kp-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px}
.kp-n{width:19px;height:19px;border-radius:50%;background:#EEEDFE;color:#534AB7;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.kp-t{font-size:13px;color:var(--color-text-primary);line-height:1.5}
</style>

const COVERS=['#EEEDFE','#E1F5EE','#FAECE7','#E6F1FB','#FAEEDA','#FBEAF0'];
const CTXT=['#534AB7','#0F6E56','#993C1D','#185FA5','#854F0B','#993556'];

let books=[];
let rs={mr:null,chunks:[],recording:false,elapsed:0,timer:null,stream:null};
try{const d=localStorage.getItem('bj3');if(d)books=JSON.parse(d);}catch(e){}
function save(){try{localStorage.setItem('bj3',JSON.stringify(books));}catch(e){}}

function search(q){
  if(!q||q.length<2)return[];
  const ql=q.toLowerCase();
  return DB.filter(b=>b.t.toLowerCase().includes(ql)||b.a.toLowerCase().includes(ql)).slice(0,5);
}

function render(){
  const bl=document.getElementById('bookList');
  const em=document.getElementById('empty');
  em.style.display=books.length?'none':'block';
  bl.innerHTML='';
  books.forEach((b,bi)=>{
    const ci=bi%COVERS.length;
    const done=b.chapters.filter(c=>c.keypoints).length;
    const el=document.createElement('div');
    el.className='book-card';
    el.innerHTML=`<div class="book-header" onclick="toggleBook(${bi})">
      <div class="book-cover" style="background:${COVERS[ci]};color:${CTXT[ci]}">${b.title.slice(0,2).toUpperCase()}</div>
      <div class="book-info">
        <div class="book-title">${esc(b.title)}</div>
        <div class="book-meta">${esc(b.author)} · ${done}/${b.chapters.length} noted</div>
      </div>
      <span class="book-chev">${b.open?'▲':'▼'}</span>
    </div>
    ${b.open?`<div class="ch-list">${b.chapters.map((ch,ci2)=>`
      <div class="ch-row" onclick="openRec(${bi},${ci2})">
        <span class="ch-n">${ci2+1}</span>
        <span class="ch-t">${esc(ch.title)}</span>
        <span class="ch-badge ${ch.keypoints?'b-done':'b-empty'}">${ch.keypoints?'noted':'add note'}</span>
      </div>`).join('')}</div>`:''}`;
    bl.appendChild(el);
  });
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toggleBook(bi){books[bi].open=!books[bi].open;save();render();}

document.getElementById('addBtn').onclick=()=>{
  document.getElementById('mc').innerHTML=`
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>Add a book</h2>
        <input type="text" id="si" placeholder="Search by title or author..." autocomplete="off" oninput="onInput()" />
        <div class="hint" id="hint">Type to search from built-in library</div>
        <div id="suggs"></div>
        <div id="preview"></div>
        <div class="actions">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-p" id="addOk" onclick="doAdd()" disabled>Add book</button>
        </div>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('si').focus(),40);
};

let _sel=null;
function onInput(){
  const q=document.getElementById('si').value.trim();
  _sel=null;
  document.getElementById('addOk').disabled=true;
  document.getElementById('preview').innerHTML='';
  const results=search(q);
  const sc=document.getElementById('suggs');
  const hint=document.getElementById('hint');
  if(!q){hint.textContent='Type to search from built-in library';sc.innerHTML='';return;}
  if(!results.length){hint.textContent='No matches — try a different title or author';sc.innerHTML='';return;}
  hint.textContent=`${results.length} match${results.length>1?'es':''}`;
  sc.innerHTML=`<div class="sugg-list">${results.map((b,i)=>`
    <div class="sugg-item" onclick="selectBook(${i})" data-i="${i}">
      <div class="sugg-title">${esc(b.t)}</div>
      <div class="sugg-author">${esc(b.a)} · ${b.y}</div>
    </div>`).join('')}</div>`;
  window._results=results;
}

function selectBook(i){
  const b=window._results[i];
  _sel=b;
  document.getElementById('si').value=b.t;
  document.getElementById('suggs').innerHTML='';
  document.getElementById('hint').textContent=`${b.c.length} chapters found`;
  document.getElementById('preview').innerHTML=`
    <div class="preview">
      <strong>${esc(b.t)}</strong>
      <span>${esc(b.a)} · ${b.y}</span>
      <div class="ch-preview">${b.c.map((c,i)=>`<div class="ch-preview-item">${i+1}. ${esc(c)}</div>`).join('')}</div>
    </div>`;
  document.getElementById('addOk').disabled=false;
}

function doAdd(){
  if(!_sel)return;
  books.push({title:_sel.t,author:_sel.a,chapters:_sel.c.map(t=>({title:t,keypoints:null,transcript:null,notes:''})),open:true});
  save();render();closeModal();
}

function closeModal(){document.getElementById('mc').innerHTML='';stopRec();}

function openRec(bi,ci){
  const b=books[bi],ch=b.chapters[ci];
  document.getElementById('mc').innerHTML=`
    <div class="overlay" onclick="if(event.target===this)saveClose(${bi},${ci})">
      <div class="modal" style="max-width:500px">
        <h2>${esc(ch.title)}</h2>
        <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:12px">${esc(b.title)}</p>
        <div class="rec-area" id="ra">
          <div class="rec-time" id="rt">0:00</div>
          <div class="rec-lbl" id="rl">Ready to record</div>
        </div>
        <div class="rec-btns">
          <button class="rb" id="rbR" onclick="toggleRec(${bi},${ci})" title="Record">&#9210;</button>
          <button class="rb" id="rbS" onclick="stopProc(${bi},${ci})" title="Stop" disabled>&#9209;</button>
        </div>
        ${ch.transcript?`<div class="tbox" id="tb">${esc(ch.transcript)}</div>`:'<div id="tb"></div>'}
        <textarea id="na" placeholder="Personal notes...">${esc(ch.notes||'')}</textarea>
        ${ch.keypoints?kpHTML(ch.keypoints):'<div id="kps"></div>'}
        <div class="actions" id="ma">
          <button class="btn" onclick="saveClose(${bi},${ci})">Close</button>
          ${ch.transcript&&!ch.keypoints?`<button class="btn btn-p" id="sb" onclick="doSum(${bi},${ci})">Summarize with Claude</button>`:''}
        </div>
      </div>
    </div>`;
}

function kpHTML(kps){return`<div class="kp-wrap" id="kps"><h3>3 key takeaways</h3>${kps.map((k,i)=>`<div class="kp-row"><div class="kp-n">${i+1}</div><div class="kp-t">${esc(k)}</div></div>`).join('')}</div>`;}

async function toggleRec(bi,ci){
  if(rs.recording){
    rs.mr.pause();rs.recording=false;clearInterval(rs.timer);
    document.getElementById('rbR').innerHTML='&#9210;';
    document.getElementById('rl').textContent='Paused';
    const d=document.getElementById('rdot');if(d)d.style.animation='none';
    return;
  }
  try{
    if(!rs.stream)rs.stream=await navigator.mediaDevices.getUserMedia({audio:true});
    if(!rs.mr||rs.mr.state==='inactive'){
      rs.mr=new MediaRecorder(rs.stream);rs.chunks=[];rs.elapsed=0;
      rs.mr.ondataavailable=e=>rs.chunks.push(e.data);rs.mr.start(100);
    }else rs.mr.resume();
    rs.recording=true;
    document.getElementById('rbR').innerHTML='&#9208;';
    document.getElementById('rbS').disabled=false;
    document.getElementById('rl').textContent='Recording...';
    const ra=document.getElementById('ra');
    if(!document.getElementById('rdot')){const d=document.createElement('div');d.className='rec-dot';d.id='rdot';ra.insertBefore(d,ra.firstChild);}
    else document.getElementById('rdot').style.animation='pulse 1s ease-in-out infinite';
    rs.timer=setInterval(()=>{rs.elapsed++;const m=Math.floor(rs.elapsed/60),s=rs.elapsed%60;const el=document.getElementById('rt');if(el)el.textContent=`${m}:${String(s).padStart(2,'0')}`;},1000);
  }catch(e){alert('Please allow microphone access to record.');}
}

async function stopProc(bi,ci){
  if(rs.mr&&rs.mr.state!=='inactive')rs.mr.stop();
  clearInterval(rs.timer);rs.recording=false;
  document.getElementById('rbR').disabled=true;document.getElementById('rbS').disabled=true;
  document.getElementById('rl').textContent='Processing...';
  await new Promise(r=>setTimeout(r,350));
  const chunks=rs.chunks.slice();
  if(!chunks.length){document.getElementById('rl').textContent='No audio detected.';return;}
  const blob=new Blob(chunks,{type:'audio/webm'});
  const reader=new FileReader();
  reader.onload=async()=>{
    const b64=reader.result.split(',')[1];
    let transcript='';
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
          messages:[{role:"user",content:[{type:"text",text:"Transcribe this audio recording. The speaker is summarizing a book chapter and sharing takeaways. Return only the transcription as plain text."},{type:"document",source:{type:"base64",media_type:"audio/webm",data:b64}}]}]})});
      const data=await res.json();
      transcript=data.content.filter(x=>x.type==='text').map(x=>x.text).join('').trim();
    }catch(e){}
    if(!transcript||transcript.length<8)transcript=prompt('Paste or type your chapter summary here:')||'';
    if(transcript){
      books[bi].chapters[ci].transcript=transcript;save();
      document.getElementById('rl').textContent='Done';
      let tb=document.getElementById('tb');
      tb.className='tbox';tb.textContent=transcript;
      const ma=document.getElementById('ma');
      if(ma&&!document.getElementById('sb')){
        const btn=document.createElement('button');btn.id='sb';btn.className='btn btn-p';
        btn.textContent='Summarize with Claude';btn.onclick=()=>doSum(bi,ci);ma.appendChild(btn);
      }
    }
  };
  reader.readAsDataURL(blob);
}

async function doSum(bi,ci){
  const t=books[bi].chapters[ci].transcript||document.getElementById('tb')?.textContent||'';
  if(!t)return;
  const kps=document.getElementById('kps');
  if(kps){kps.style.display='block';kps.innerHTML=`<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--color-text-secondary)"><div class="spin"></div>Summarizing...</div>`;}
  const sb=document.getElementById('sb');if(sb)sb.disabled=true;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,
        messages:[{role:"user",content:`Extract exactly 3 key takeaways from this spoken book chapter summary. Return ONLY a JSON array of 3 strings, no markdown, no preamble.\n\n${t}`}]})});
    const data=await res.json();
    const txt=data.content.filter(x=>x.type==='text').map(x=>x.text).join('');
    const arr=JSON.parse(txt.replace(/```json|```/g,'').trim());
    books[bi].chapters[ci].keypoints=arr;save();render();
    if(kps)kps.outerHTML=kpHTML(arr);
    if(sb)sb.remove();
  }catch(e){
    if(kps)kps.innerHTML='<p style="font-size:13px;color:var(--color-text-secondary)">Could not summarize. Try again.</p>';
    if(sb)sb.disabled=false;
  }
}

function saveClose(bi,ci){
  const na=document.getElementById('na');if(na)books[bi].chapters[ci].notes=na.value;
  save();render();closeModal();
}
function stopRec(){
  if(rs.mr){try{rs.mr.stop();}catch(e){}}
  if(rs.stream){rs.stream.getTracks().forEach(t=>t.stop());rs.stream=null;}
  clearInterval(rs.timer);
  rs={mr:null,chunks:[],recording:false,elapsed:0,timer:null,stream:null};
}

render();
</script>
